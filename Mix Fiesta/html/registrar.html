<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="../css/login_index.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">CREAR CUENTA</h1>
            
            <form class="login-form">
                <div class="form-group">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" placeholder="Ingrese su nombre de usuario" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="Ingrese su correo electrónico" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese su contraseña" required>
                </div>

                <div class="form-group">
                    <label for="password-verify">Verificar contraseña</label>
                    <input type="password" id="password-verify" placeholder="Verifique su contraseña" required>
                </div>

                <div class="form-group">
                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" placeholder="Ingrese su teléfono" required>
                </div>

                <div class="form-group">
                    <label for="age">Edad</label>
                    <input type="number" id="age" placeholder="Ingrese su edad" min="1" max="120" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Registrarse</button>
                <a href="index.html" class="btn btn-secondary">Volver a Inicio de Sesión</a>
            </form>
        </div>
    </div>
</body>
</html>
